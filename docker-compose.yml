services:
  backend:
    build: ./backend
    container_name: skystates-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URL=https://skyreviews.us
      - JWT_SECRET=${JWT_SECRET:-skystates-jwt-secret-change-in-production}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    expose:
      - "5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: "/api"
    container_name: skystates-frontend
    ports:
      - "3080:80"
    depends_on:
      - backend
    restart: unless-stopped
