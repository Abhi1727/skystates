<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Start your high-paying tech career with Sky States. Get job-ready skills, 100% job placement support, and Microsoft Certificate"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Modern Professional Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Locomotive Scroll CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Global Font Styles -->
    <style>
      * {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        box-sizing: border-box;
      }
      
      html, body {
        overflow-x: hidden;
        max-width: 100vw;
        margin: 0;
        padding: 0;
      }
      
      #root {
        overflow-x: hidden;
        max-width: 100vw;
        width: 100%;
      }
      
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.2;
        margin-bottom: 0.5em;
      }
      
      h1 {
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.1;
      }
      
      h2 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        font-weight: 700;
        letter-spacing: -0.025em;
      }
      
      h3 {
        font-size: clamp(1.25rem, 3vw, 2rem);
        font-weight: 600;
      }
      
      h4 {
        font-size: clamp(1.1rem, 2.5vw, 1.5rem);
        font-weight: 600;
      }
      
      p {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: clamp(0.95rem, 2vw, 1.1rem);
        line-height: 1.7;
        font-weight: 400;
        color: #4a5568;
        margin-bottom: 1em;
      }
      
      .heading-display {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 700;
        letter-spacing: -0.04em;
      }
      
      .text-gradient {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .text-gold {
        background: linear-gradient(135deg, #ffd700, #ffed4e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .subtitle {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: clamp(1rem, 2.5vw, 1.25rem);
        font-weight: 500;
        color: #64748b;
        line-height: 1.6;
      }
      
      .price-text {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 700;
        font-size: clamp(1.5rem, 3vw, 2.5rem);
        letter-spacing: -0.02em;
      }
      
      .cta-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 600;
        font-size: clamp(0.9rem, 2vw, 1.1rem);
        letter-spacing: 0.01em;
      }
      
      .testimonial-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-style: italic;
        font-size: clamp(0.95rem, 2vw, 1.15rem);
        line-height: 1.8;
        color: #2d3748;
      }
      
      .feature-title {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 600;
        font-size: clamp(1.1rem, 2.5vw, 1.3rem);
        letter-spacing: -0.01em;
        color: #1a202c;
      }
      
      .stat-number {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: -0.03em;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 400;
        line-height: 1.6;
        color: #2d3748;
        font-size: 16px;
      }
      
      /* Enhanced readability */
      .text-white p {
        color: rgba(255, 255, 255, 0.9);
      }
      
      .text-white .subtitle {
        color: rgba(255, 255, 255, 0.8);
      }
      
      /* Locomotive Scroll Styles */
      html.has-scroll-smooth {
        overflow: hidden;
      }
      
      body {
        overflow-y: auto;
      }
      
      [data-scroll-container] {
        position: relative;
        overflow: hidden;
      }
    </style>
    
    <title>Sky States – High-Paying Tech Career with 100% Job Placement</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
