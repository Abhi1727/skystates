# Nginx config for skyreviews.us - Sky States Educational Platform
# Add this to your nginx sites (e.g. /etc/nginx/sites-available/ or /etc/nginx/conf.d/)
# Then: sudo ln -s /etc/nginx/sites-available/skyreviews.conf /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name skyreviews.us www.skyreviews.us;

    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
